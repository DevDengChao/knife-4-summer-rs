name: Publish crate

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-crate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version
          cargo --version

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Release tag must be a bare stable SemVer version like 0.1.0; got '${tag}'."
            exit 1
          fi

          version="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import json, sys; metadata = json.load(sys.stdin); print(next(package["version"] for package in metadata["packages"] if package["name"] == "knife-4-summer-rs"))')"

          if [[ "$version" != "$tag" ]]; then
            echo "::error::Release tag '${tag}' must match Cargo package version '${version}'."
            exit 1
          fi

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Test frontend
        run: pnpm --dir frontend test

      - name: Lint frontend
        run: pnpm --dir frontend lint

      - name: Check frontend formatting
        run: pnpm --dir frontend format

      - name: Generate frontend assets
        run: pnpm --dir frontend generate

      - name: Sync embedded assets
        run: pnpm --dir frontend sync:assets

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: List crate package contents
        shell: bash
        run: |
          set -euo pipefail
          package_files="$(cargo package --allow-dirty --list -p knife-4-summer-rs)"
          printf '%s\n' "$package_files"

          for required_file in \
            assets/knife4j/index.html \
            assets/knife4j/_knife4j/entry.js \
            assets/knife4j/_knife4j/Knife4jConsole.js \
            assets/knife4j/_knife4j/Knife4jConsole.css
          do
            if ! grep -Fxq "$required_file" <<< "$package_files"; then
              echo "::error::Generated asset '${required_file}' is missing from the crate package."
              exit 1
            fi
          done

      - name: Dry-run crate publish
        run: cargo publish --dry-run --locked --allow-dirty -p knife-4-summer-rs

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked --allow-dirty -p knife-4-summer-rs
